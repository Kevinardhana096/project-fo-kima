services:
  mysql:
    image: mysql:8.4
    container_name: fo-kima-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fo_kima}
      MYSQL_USER: ${MYSQL_USER:-fo_kima_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fo_kima_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      TZ: ${MYSQL_TZ:-Asia/Makassar}
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
